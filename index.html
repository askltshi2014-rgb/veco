<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEXO EGYPT | ULTIMATE HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon-blue: #00f2fe; --deep-blue: #0ea5e9; --dark-bg: #020617; }
        body { background: var(--dark-bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .vision-sector { position: relative; width: 100%; height: 50vh; background: #000; border-bottom: 2px solid var(--deep-blue); }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud-frame { position: absolute; border: 1px solid rgba(0, 242, 254, 0.3); background: rgba(0, 0, 0, 0.6); padding: 5px 10px; font-size: 0.7em; border-left: 4px solid var(--neon-blue); font-family: monospace; }
        .top-left { top: 15px; left: 15px; }
        .top-right { top: 15px; right: 15px; text-align: right; }
        .control-deck { flex: 1; background: #0f172a; padding: 20px; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -10px 40px rgba(0,0,0,1); display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { background: #1e293b; color: #fff; padding: 15px; border: 1px solid var(--deep-blue); border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-voice { grid-column: span 2; background: var(--deep-blue); font-size: 1.25em; border: none; box-shadow: 0 0 20px rgba(14, 165, 233, 0.6); }
        #log-screen { background: #000; color: #4ade80; font-family: monospace; font-size: 0.8em; padding: 10px; border-radius: 12px; margin-top: 15px; flex: 1; overflow-y: auto; border: 1px solid #1e293b; text-align: left; }
    </style>
</head>
<body>

    <div class="vision-sector">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="hud-frame top-left">VEXO-OS v10.2<br>SCANNING...</div>
        <div class="hud-frame top-right">ISMAILIA, EG<br>VEXO EGYPT</div>
    </div>

    <div class="control-deck">
        <button class="btn btn-voice" onclick="startVexoVoice()">تحدث مع فيكسو 🎙️</button>
        <div class="grid">
            <button class="btn" onclick="triggerApp('poultry')">فتح بولتري</button>
            <button class="btn" onclick="triggerApp('wadi')">كتكوت الوادي</button>
            <button class="btn" onclick="toggleTorch()">كشاف 💡</button>
            <button class="btn" style="border-color:#4ade80" onclick="exportData()">تصدير 📄</button>
        </div>
        <div id="log-screen">-- جاهز للعمل يا هندسة --</div>
    </div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const logScreen = document.getElementById('log-screen');
    let model, stream, isFlash = false, fullLog = [];

    async function initSystem() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            model = await cocoSsd.load();
            addToLog("النظام العالمي يعمل ✅");
            detect();
        } catch (e) { addToLog("خطأ: " + e); }
    }

    async function detect() {
        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            ctx.strokeStyle = '#00f2fe';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = '#00f2fe';
            ctx.fillText(p.class, x, y - 5);
        });
        requestAnimationFrame(detect);
    }

    function startVexoVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA';
        rec.onstart = () => { addToLog("فيكسو يسمعك..."); };
        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript;
            addToLog("أنت: " + cmd);
            if (cmd.includes("وزن") || cmd.includes("بولتري")) triggerApp('poultry');
            else if (cmd.includes("الوادي")) triggerApp('wadi');
            else if (cmd.includes("ملاحظة")) {
                const note = cmd.replace("ملاحظة", "").trim();
                addToLog("📝 سجلت: " + note);
            }
        };
        rec.start();
    }

    // هنا تم تعديل الروابط بناءً على ما أرسلت يا هندسة
    function triggerApp(type) {
        let pkg = (type === 'poultry') ? "com.poultry.chicken" : "com.katkootalwadi.katkootalwadi";
        window.location.href = `intent://#Intent;scheme=android.intent.action.MAIN;package=${pkg};end`;
    }

    function addToLog(m) {
        const entry = `[${new Date().toLocaleTimeString('ar-EG')}] ${m}`;
        fullLog.push(entry);
        logScreen.innerHTML = fullLog.slice(-10).join('<br>');
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    async function toggleTorch() {
        const track = stream.getVideoTracks()[0];
        isFlash = !isFlash;
        await track.applyConstraints({ advanced: [{ torch: isFlash }] });
    }

    function exportData() {
        const blob = new Blob([fullLog.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Vexo_Egypt_Report.txt`;
        a.click();
    }

    initSystem();
</script>
</body>
</html>
