<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEXO EGYPT PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon-blue: #00f2fe; --dark-bg: #020617; }
        body { background: var(--dark-bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .vision { position: relative; width: 100%; height: 45vh; background: #000; border-bottom: 2px solid var(--neon-blue); }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .deck { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #0f172a; border-radius: 30px 30px 0 0; }
        .btn { background: #1e293b; color: #fff; padding: 20px; border: 1px solid var(--neon-blue); border-radius: 15px; font-weight: bold; font-size: 1.1em; }
        .btn-main { background: var(--neon-blue); color: #000; font-size: 1.3em; }
        #log { background: #000; color: #4ade80; font-family: monospace; font-size: 0.8em; padding: 10px; border-radius: 10px; flex: 1; overflow-y: auto; }
    </style>
</head>
<body>

<div class="vision">
    <video id="v" autoplay muted playsinline></video>
    <canvas id="c"></canvas>
</div>

<div class="deck">
    <button class="btn btn-main" onclick="startVoice()">تحدث مع فيكسو 🎙️</button>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn" onclick="openApp('poultry')">تطبيق بولتري</button>
        <button class="btn" onclick="openApp('wadi')">كتكوت الوادي</button>
    </div>
    <div id="log">-- جاهز للعمل يا هندسة --</div>
</div>

<script>
    const video = document.getElementById('v');
    const log = document.getElementById('log');
    let stream;

    async function init() {
        stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
        video.srcObject = stream;
        const model = await cocoSsd.load();
        setInterval(async () => {
            const preds = await model.detect(video);
            const ctx = document.getElementById('c').getContext('2d');
            ctx.clearRect(0,0,300,150);
            preds.forEach(p => {
                ctx.strokeStyle = '#00f2fe';
                ctx.strokeRect(p.bbox[0]/2, p.bbox[1]/2, p.bbox[2]/2, p.bbox[3]/2);
            });
        }, 100);
    }

    function openApp(type) {
        // الروابط دي هي اللي بتفتح التطبيق "دايركت" لو متسطب
        const pkg = (type === 'poultry') ? 'com.poultry.chicken' : 'com.katkootalwadi.katkootalwadi';
        const url = `android-app://${pkg}`;
        
        addToLog("جاري محاولة الفتح المباشر...");
        window.location.href = `intent://scan/#Intent;scheme=android-app;package=${pkg};end`;
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA';
        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript;
            addToLog("أمر: " + cmd);
            if(cmd.includes("وزن") || cmd.includes("بولتري")) openApp('poultry');
            if(cmd.includes("ملاحظة")) addToLog("📝 تم تسجيل ملاحظة");
        };
        rec.start();
    }

    function addToLog(m) {
        log.innerHTML += `<br>[${new Date().toLocaleTimeString('ar-EG')}] ${m}`;
        log.scrollTop = log.scrollHeight;
    }

    init();
</script>
</body>
</html>
